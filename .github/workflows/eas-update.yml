name: EAS OTA Update

# Auto-publish an over-the-air (JS) update whenever app code is pushed:
#   push to staging → staging channel (staging app)
#   push to main    → production channel (prod app)
#
# IMPORTANT: APP_VARIANT must match the build's variant, because the fingerprint
# runtimeVersion is derived from native config (app.config.ts varies the package
# name by APP_VARIANT). If it doesn't match, the OTA won't apply to the build.
# EXPO_PUBLIC_API_BASE_URL bakes the correct API URL into the JS bundle.
#
# Native changes (new fingerprint) won't apply to old installs — rebuild + reupload
# to the Play Store manually for those.
#
# Requires a repo secret EXPO_TOKEN (Expo dashboard → Access tokens).

on:
  push:
    branches: [staging, main]

jobs:
  update:
    name: Publish OTA update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Resolve environment from branch
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "channel=production" >> "$GITHUB_OUTPUT"
            echo "variant=production" >> "$GITHUB_OUTPUT"
            echo "apiurl=https://hoboenterprise.in" >> "$GITHUB_OUTPUT"
          else
            echo "channel=staging" >> "$GITHUB_OUTPUT"
            echo "variant=staging" >> "$GITHUB_OUTPUT"
            echo "apiurl=https://staging.hoboenterprise.in" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish update
        env:
          APP_VARIANT: ${{ steps.env.outputs.variant }}
          EXPO_PUBLIC_API_BASE_URL: ${{ steps.env.outputs.apiurl }}
        run: eas update --branch ${{ steps.env.outputs.channel }} --message "${{ github.event.head_commit.message }}" --non-interactive
